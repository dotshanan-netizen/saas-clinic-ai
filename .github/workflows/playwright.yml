name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: clinova_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Push Prisma Schema to Test DB
      run: npx prisma db push --skip-generate
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/clinova_test"

    - name: Seed Database
      run: npx prisma db seed
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/clinova_test"

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Start Next.js Server
      run: |
        npm run dev &
        # Wait for dev server to boot
        for i in {1..30}; do
          if curl -s http://localhost:3000 > /dev/null; then
            echo "Next.js dev server is up!"
            exit 0
          fi
          echo "Waiting for Next.js server..."
          sleep 2
        done
        echo "Next.js server failed to start"
        exit 1
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/clinova_test"
        ENCRYPTION_KEY: "rival_secret_default_key_32_bytes_len"
        OPENAI_API_KEY: "mock-key"
        GEMINI_API_KEY: "mock-key"
        WHATSAPP_VERIFY_TOKEN: "mock-token"
        META_ACCESS_TOKEN: "mock-token"
        CLINIC_TIMEZONE: "Asia/Riyadh"

    - name: Run Playwright tests
      run: npx playwright test
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/clinova_test"
        ENCRYPTION_KEY: "rival_secret_default_key_32_bytes_len"
        OPENAI_API_KEY: "mock-key"
        GEMINI_API_KEY: "mock-key"
        WHATSAPP_VERIFY_TOKEN: "mock-token"
        META_ACCESS_TOKEN: "mock-token"
        CLINIC_TIMEZONE: "Asia/Riyadh"

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
